<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 创意助手 | Agent Demo</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/lucide.min.js"></script>
  <script src="/js/marked.min.js"></script>
</head>

<body>
  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><i data-lucide="sparkles"></i> AI 创意助手</h2>
      <button class="menu-toggle" onclick="toggleSidebar()"><i data-lucide="x"></i></button>
    </div>

    <div class="settings-content">
      <div class="form-group">
        <label>火山引擎 API Key</label>
        <input type="password" id="arkKey" placeholder="ark-..." spellcheck="false" autocomplete="off">
        <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 0.25rem;">* 必填，用于对话与生成</p>
      </div>
      <div class="form-group">
        <label>博查搜索 API Key</label>
        <input type="password" id="bochaKey" placeholder="bc-..." spellcheck="false" autocomplete="off">
        <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 0.25rem;">* 选填，开启联网搜索</p>
      </div>
      <button class="btn-full btn-primary" onclick="saveKeys()">
        <i data-lucide="save" style="width:14px"></i> 保存配置
      </button>

      <div style="margin-top: 2rem;">
        <label
          style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.8rem; display: block;">会话管理</label>
        <button class="btn-full btn-outline" onclick="clearHistory()">
          <i data-lucide="trash-2" style="width:14px"></i> 清空对话历史
        </button>
      </div>
    </div>

    <div class="sidebar-footer">
      <div style="font-size: 0.7rem; color: var(--text-secondary); text-align: center; opacity: 0.6;">V3.5 Refactored
        Edition</div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-container">
    <header class="navbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
      <div style="font-weight: 700; color: var(--primary); margin-left: 0.5rem; font-size: 0.95rem;">AI 创意助手</div>
    </header>

    <section class="chat-view" id="chatView">
      <div class="chat-inner" id="chatList">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon"><i data-lucide="bot" style="width:100%; height:100%"></i></div>
          <h1>欢迎使用 AI 创意助手</h1>
          <p>我可以写文章、搜资料、生成惊艳的 AI 图片和视频</p>
          <div class="suggestion-grid">
            <div class="suggestion-item" onclick="useSuggest('帮我写一个关于未来城市的短诗，并生成一张配图')">未来城市诗歌</div>
            <div class="suggestion-item" onclick="useSuggest('搜索2024年最新的科技趋势')">科技趋势搜索</div>
            <div class="suggestion-item" onclick="useSuggest('我想做一段 5 秒的海浪风景视频')">海浪视频制作</div>
            <div class="suggestion-item" onclick="useSuggest('解析一下量子力学在生活中的应用')">深度知识解析</div>
          </div>
        </div>
      </div>
    </section>

    <footer class="input-wrapper">
      <div class="input-card">
        <textarea id="userInput" placeholder="输入消息或灵感..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <i data-lucide="arrow-up" style="width:18px;height:18px"></i>
        </button>
      </div>
    </footer>
  </main>

  <!-- Media Preview Modal -->
  <div class="modal" id="mediaModal" onclick="closePreview()">
    <button class="modal-close" onclick="closePreview()"><i data-lucide="x"></i></button>
    <div id="modalMedia" style="display:contents"></div>
  </div>

  <div id="toast">已保存</div>

  <!-- Main Logic -->
  <script src="/js/app.js"></script>
</body>

</html>
